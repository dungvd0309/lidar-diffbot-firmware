; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
; Pinned to Arduino-ESP32 2.0.17 (platform-espressif32 6.10.0) for micro-ROS
; serial throughput; 3.x cores are significantly slower.
platform = espressif32@6.10.0
board = esp32dev
framework = arduino
monitor_speed = 921600
lib_deps =
	    https://github.com/micro-ROS/micro_ros_arduino@^2.0.8-humble
	    adafruit/Adafruit BNO055@^1.6.2
	    adafruit/Adafruit Unified Sensor@^1.1.14

build_flags =
	    -L${platformio.libdeps_dir}/${PIOENV}/micro_ros_arduino/src/esp32
	    -Wl,--whole-archive -lmicroros -Wl,--no-whole-archive

lib_ldf_mode = deep+
